name: Resume E-GMD TensorFlow.js conversion

on:
  push:
    paths:
      - .github/workflows/convert-e-gmd-tfjs-only.yml

permissions:
  contents: write
  actions: read

jobs:
  convert-tensorflowjs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Record current run
        shell: bash
        run: |
          set -euo pipefail
          printf '{"runId":%s,"artifact":"tfjs-e-gmd-float32","status":"running"}\n' \
            "$GITHUB_RUN_ID" > .github/e-gmd-latest-run.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/e-gmd-latest-run.json
          git commit -m "ci: record active E-GMD conversion run"
          git push

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - uses: actions/download-artifact@v4
        with:
          name: frozen-e-gmd
          path: frozen
          run-id: "29559610151"
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}

      - name: Convert without quantization
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "tensorflowjs==4.22.0"
          mkdir -p converter-stubs
          printf '%s\n' \
            'import sys, types' \
            'sys.modules["tensorflow_decision_forests"] = types.ModuleType("tensorflow_decision_forests")' \
            > converter-stubs/sitecustomize.py
          PYTHONPATH="$PWD/converter-stubs" tensorflowjs_converter \
            --input_format=tf_frozen_model \
            --output_node_names=onset_probs,velocity_values \
            frozen/frozen_e_gmd.pb tfjs-e-gmd
          test -f tfjs-e-gmd/model.json
          test -n "$(find tfjs-e-gmd -name '*.bin' -print -quit)"

      - uses: actions/upload-artifact@v4
        with:
          name: tfjs-e-gmd-float32
          path: tfjs-e-gmd
          if-no-files-found: error
          retention-days: 7

      - name: Record reusable artifact run
        shell: bash
        run: |
          set -euo pipefail
          git pull --rebase
          printf '{"runId":%s,"artifact":"tfjs-e-gmd-float32","status":"complete"}\n' \
            "$GITHUB_RUN_ID" > .github/e-gmd-latest-run.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/e-gmd-latest-run.json
          git commit -m "ci: record E-GMD conversion artifact run"
          git push
